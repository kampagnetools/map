<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --msf: #e11a22; --water: #b5d5d5; --land: #f3ece6; }
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #121212; color: #eee; overflow: hidden; }
        .header { height: 50px; padding: 0 20px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--msf); }
        .controls { background: #252525; padding: 12px 20px; display: flex; gap: 25px; align-items: center; border-bottom: 1px solid #444; font-size: 12px; }
        #viewport { flex: 1; position: relative; background: #1a1a1a; display: flex; justify-content: center; align-items: center; }
        #map-window { width: 1200px; height: 600px; background: var(--water); position: relative; overflow: hidden; flex-shrink: 0; border: 1px solid #000; }
        svg { width: 100%; height: 100%; cursor: crosshair; position: absolute; }
        .country { fill: var(--land); stroke: #999; stroke-width: 0.3px; cursor: pointer; transition: fill 0.2s; }
        .country.active { fill: var(--msf) !important; }
        #msf-box { position: absolute; background: white; color: black; width: 280px; z-index: 150; border-left: 8px solid var(--msf); box-shadow: 5px 5px 20px rgba(0,0,0,0.4); left: 10px; top: 10px; }
        .drag-bar { background: #eee; height: 22px; cursor: move; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #999; }
        .label-wrap { position: absolute; transform: translate(-50%, -100%); z-index: 110; display: flex; flex-direction: column; align-items: center; }
        .label-box { background: white; padding: 6px 14px; color: black; font-weight: 900; text-transform: uppercase; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); cursor: move; outline: none; white-space: nowrap; border-bottom: 3px solid var(--msf); letter-spacing: 0.5px; }
        button { padding: 8px 16px; background: #444; color: white; border: 1px solid #666; cursor: pointer; font-size: 12px; border-radius: 4px; }
        .btn-red { background: var(--msf); border: none; font-weight: bold; }
    </style>
</head>
<body x-data="mapEditor()">

<div class="header">
    <div style="font-weight:900; letter-spacing:1px;">MSF - KORT GENERATOR</div>
    <button class="btn-red" @click="exportMap()">KOPIÉR KODE (VIRKER PÅ MOBIL)</button>
</div>

<div class="controls">
    <button @click="zoom(1.5)">Zoom +</button>
    <button @click="zoom(0.7)">Zoom -</button>
    <button @click="resetView()">Nulstil</button>
    <input type="range" min="10" max="40" x-model="fontSize">
    <span x-text="fontSize + 'px'"></span>
</div>

<div id="viewport">
    <div id="map-window">
        <svg id="canvas"><g id="map-layer"></g><g id="lines-layer"></g></svg>
        <div id="msf-box" x-init="makeDraggable($el)">
            <div class="drag-bar">Flyt boks (Desktop)</div>
            <div style="padding:15px;">
                <div id="h-in" contenteditable="true" style="font-weight:900; font-size:18px; outline:none; font-family:sans-serif; text-transform:uppercase;">OVERSKRIFT</div>
                <div id="s-in" contenteditable="true" style="font-size:13px; font-weight:bold; outline:none; margin-top:5px; font-family:sans-serif;">Undertekst her</div>
            </div>
        </div>
        <template x-for="(label, id) in labels" :key="id">
            <div class="label-wrap" :style="`left: ${label.x}px; top: ${label.y}px;`" x-init="makeLabelDraggable($el, id)">
                <div class="label-box" contenteditable="true" x-text="label.name" @input="labels[id].name = $el.innerText" :style="`font-size: ${fontSize}px; font-family:sans-serif;`"></div>
                <div style="background:#333; padding:4px; display:flex; gap:6px; margin-top:4px; border-radius:4px;">
                    <button style="font-size:9px; padding:2px 6px;" @click="label.useLine = !label.useLine; drawLines(currentK)">Streg</button>
                    <input style="font-size:9px; width:70px; background:#000; color:#fff; border:1px solid #555;" x-model="labels[id].url" placeholder="Link...">
                </div>
            </div>
        </template>
    </div>
</div>

<script>
function mapEditor() {
    return {
        fontSize: 14, labels: {}, currentK: 1, g: null, linesG: null, zoomHandler: null,
        daNames: { "Afghanistan":"Afghanistan","Syria":"Syrien","Sudan":"Sudan","South Sudan":"Sydsudan","Democratic Republic of the Congo":"Dem. Rep. Congo","Ukraine":"Ukraine","Yemen":"Yemen","Central African Republic":"Centralafrikanske Rep.","Ethiopia":"Etiopien","Gaza":"Gaza","Palestine":"Palæstina","Lebanon":"Libanon","Mali":"Mali","Myanmar":"Myanmar","Nigeria":"Nigeria","Somalia":"Somalia","Haiti":"Haiti","Greece":"Grækenland","Iraq":"Irak","Libya":"Libyen","Chad":"Tchad","Niger":"Niger","Burkina Faso":"Burkina Faso" },
        init() {
            const svg = d3.select("#canvas");
            this.g = d3.select("#map-layer");
            this.linesG = d3.select("#lines-layer");
            const projection = d3.geoMercator().scale(195).translate([600, 420]);
            const path = d3.geoPath().projection(projection);
            this.zoomHandler = d3.zoom().scaleExtent([1, 40]).on("zoom", (e) => {
                this.currentK = e.transform.k;
                this.g.attr("transform", e.transform);
                this.linesG.attr("transform", e.transform);
                this.updateLabelPositions();
            });
            svg.call(this.zoomHandler);
            d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson").then(data => {
                this.g.selectAll("path").data(data.features).enter().append("path")
                    .attr("d", path).attr("class", "country")
                    .on("click", (e, d) => {
                        const el = d3.select(e.currentTarget);
                        const active = !el.classed("active");
                        el.classed("active", active);
                        if(active) {
                            const center = path.centroid(d);
                            const displayName = this.daNames[d.properties.name] || d.properties.name;
                            this.labels[d.id] = { name: displayName, anchorX: center[0], anchorY: center[1], worldX: center[0], worldY: center[1], useLine: true, url: "" };
                        } else { delete this.labels[d.id]; }
                        this.updateLabelPositions();
                    });
            });
        },
        updateLabelPositions() {
            const t = d3.zoomTransform(d3.select("#canvas").node());
            Object.values(this.labels).forEach(l => {
                l.x = l.worldX * t.k + t.x; l.y = l.worldY * t.k + t.y;
            });
            this.drawLines(t.k);
        },
        drawLines(k = 1) {
            this.linesG.selectAll("g").remove();
            Object.values(this.labels).forEach(l => {
                if (!l.useLine) return;
                const group = this.linesG.append("g");
                group.append("line").attr("x1", l.anchorX).attr("y1", l.anchorY).attr("x2", l.worldX).attr("y2", l.worldY).attr("stroke", "white").attr("stroke-width", 5/k);
                group.append("line").attr("x1", l.anchorX).attr("y1", l.anchorY).attr("x2", l.worldX).attr("y2", l.worldY).attr("stroke", "#c2151b").attr("stroke-width", 3/k);
                group.append("circle").attr("cx", l.anchorX).attr("cy", l.anchorY).attr("r", 5.5/k).attr("fill", "#e11a22").attr("stroke", "white").attr("stroke-width", 1.5/k);
            });
        },
        makeDraggable(el) {
            d3.select(el).call(d3.drag().filter(e => e.target.className === 'drag-bar').on("drag", (e) => { el.style.left = e.x + "px"; el.style.top = e.y + "px"; }));
        },
        makeLabelDraggable(el, id) {
            d3.select(el).call(d3.drag().on("drag", (e) => {
                const t = d3.zoomTransform(d3.select("#canvas").node());
                this.labels[id].worldX = (e.x - t.x) / t.k;
                this.labels[id].worldY = (e.y - t.y) / t.k;
                this.updateLabelPositions();
            }));
        },
        zoom(f) { d3.select("#canvas").transition().call(this.zoomHandler.scaleBy, f); },
        resetView() { d3.select("#canvas").transition().call(this.zoomHandler.transform, d3.zoomIdentity); },
        exportMap() {
            const t = d3.zoomTransform(d3.select("#canvas").node()), box = document.getElementById('msf-box');
            let labs = "", linesHtml = "";
            Object.values(this.labels).forEach(l => {
                const pX = ((l.worldX * t.k + t.x) / 12);
                const pY = ((l.worldY * t.k + t.y) / 6);
                const isLink = l.url && l.url.trim() !== "";
                const content = isLink ? `<a href="${l.url}" target="_blank" style="color:inherit;text-decoration:none;cursor:pointer;display:block;">${l.name}</a>` : l.name;
                
                labs += `<div style="position:absolute;left:${pX.toFixed(2)}%;top:${pY.toFixed(2)}%;transform:translate(-50%,-100%);background:#fff;padding:.4em .8em;box-shadow:3px 3px 6px rgba(0,0,0,.15);z-index:10;white-space:nowrap;font-family:sans-serif;font-weight:900;text-transform:uppercase;font-size:clamp(10px,${(this.fontSize/12).toFixed(2)}vw,22px);line-height:1;border-bottom:.3vw solid #e11a22;letter-spacing:.02em;pointer-events:auto;">${content}</div>`;
                
                if(l.useLine) {
                    linesHtml += `<line x1="${l.anchorX}" y1="${l.anchorY}" x2="${l.worldX}" y2="${l.worldY}" stroke="#fff" stroke-width="${(5/t.k).toFixed(4)}" stroke-linecap="round"/><line x1="${l.anchorX}" y1="${l.anchorY}" x2="${l.worldX}" y2="${l.worldY}" stroke="#c2151b" stroke-width="${(3/t.k).toFixed(4)}" stroke-linecap="round"/><circle cx="${l.anchorX}" cy="${l.anchorY}" r="${(5.5/t.k).toFixed(3)}" fill="#e11a22" stroke="#fff" stroke-width="${(1.5/t.k).toFixed(4)}"/>`;
                }
            });
            const h = document.getElementById('h-in').innerText, s = document.getElementById('s-in').innerText;
            
            const finalHtml = `<div class="msf-outer-wrap" style="width:100%;max-width:1200px;margin:0 auto;display:flex;flex-direction:column;font-family:sans-serif;">
<style>
    .msf-outer-wrap { position: relative; width: 100%; }
    .msf-map-section { position:relative; width:100%; aspect-ratio:1200/600; background:#b5d5d5; overflow:hidden; }
    .msf-label-overlay { position: absolute; inset: 0; pointer-events: none; }
    .msf-hybrid-box { background:#fff; padding:20px; border-left:8px solid #e11a22; z-index:50; }
    @media (min-width: 769px) {
        .msf-hybrid-box { position: absolute; left:${(box.offsetLeft/12).toFixed(2)}%; top:${(box.offsetTop/6).toFixed(2)}%; width:280px; box-shadow:5px 5px 20px rgba(0,0,0,0.2); }
    }
    @media (max-width: 768px) {
        .msf-hybrid-box { position: static; width: 100%; box-sizing: border-box; box-shadow: none; padding: 25px 20px; border-bottom: 2px solid #eee; }
    }
</style>
<div class="msf-map-section">
    <svg viewBox="${-t.x/t.k} ${-t.y/t.k} ${1200/t.k} ${600/t.k}" style="width:100%;height:100%;display:block;position:absolute;top:0;left:0;">
        <style>.c{fill:#f3ece6;stroke:#999;stroke-width:${(0.4/t.k).toFixed(4)}}.a{fill:#e11a22!important}</style>
        ${this.g.html().replace(/class="country active"/g, 'class="c a"').replace(/class="country"/g, 'class="c"').replace(/\s+/g,' ')}
        <g>${linesHtml}</g>
    </svg>
    <div class="msf-label-overlay">${labs}</div>
</div>
<div class="msf-hybrid-box">
    <p style="font-weight:900; font-size:20px; color:#000; line-height:1.1; margin:0; text-transform:uppercase;">${h}</p>
    <p style="font-size:15px; margin-top:8px; color:#333; font-weight:700; margin-bottom:0;">${s}</p>
</div>
</div>`;

            navigator.clipboard.writeText(finalHtml.replace(/\s+/g,' '));
            alert("Kode kopieret!");
        }
    }
}
</script>
</body>
</html>
